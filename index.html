<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cases Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    .case { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 6px; }
    .case strong { color: #0078d4; }
    .status-active { color: green; }
    .status-resolved { color: gray; }
    #message { margin: 16px 0; color: #555; }
  </style>
</head>
<body>
  <h2>Dynamics 365 Cases</h2>
  <button id="login-btn">Sign in with Microsoft</button>
  <p id="message"></p>
  <div id="cases"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
